<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomas & Shannie · Rater Vin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --warm-white: #FAF7F2;
    --ink: #1A1614;
    --muted: #7A6E68;
    --border: #DDD5C8;
    --red-accent: #8B2635;
    --gold: #C4973A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--warm-white); color: var(--ink); font-family: 'Raleway', sans-serif; font-weight: 300; min-height: 100vh; }

  header { text-align: center; padding: 80px 40px 0; }
  header::after { content: ''; display: block; width: 60px; height: 1px; background: var(--gold); margin: 30px auto 0; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 6vw, 5.5rem); font-weight: 300; line-height: 1.05; }
  h1 em { font-style: italic; color: var(--red-accent); }
  .header-sub { font-size: 11px; letter-spacing: 5px; color: var(--muted); margin-top: 14px; text-transform: uppercase; }

  .stats-bar { display: flex; gap: 40px; justify-content: center; padding: 28px 40px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 40px 0 0; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-number { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--red-accent); line-height: 1; }
  .stat-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  nav { display: flex; justify-content: center; padding: 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 60px; }
  .tab { font-family: 'Raleway', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); padding: 20px 28px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.25s ease; background: none; border-top: none; border-left: none; border-right: none; white-space: nowrap; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--red-accent); }
  .tab-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .dot-red { background: #8B2635; } .dot-white { background: #C4B483; border: 1px solid #bbb; } .dot-orange { background: #C87941; } .dot-rose { background: #D4899A; }

  main { max-width: 1300px; margin: 0 auto; padding: 0 40px 100px; }
  .section { display: none; } .section.active { display: block; }
  .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; font-style: italic; color: var(--muted); white-space: nowrap; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-count { font-size: 11px; letter-spacing: 2px; color: var(--muted); white-space: nowrap; }

  .wine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 36px; }
  .wine-card { background: var(--cream); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; animation: fadeUp 0.5s ease forwards; opacity: 0; }
  .wine-card:hover { transform: translateY(-5px); box-shadow: 0 24px 60px rgba(0,0,0,0.09); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

  .wine-image { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: var(--border); }
  .wine-placeholder { width: 100%; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #EDE5D8 0%, #D8CBBA 100%); font-size: 3.5rem; }
  .wine-body { padding: 22px; }
  .wine-producer { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .wine-name { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 400; line-height: 1.25; margin-bottom: 10px; }
  .wine-meta { display: flex; flex-wrap: wrap; gap: 4px 0; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 14px; }
  .wine-meta span + span::before { content: ' · '; }
  .wine-rating { display: flex; align-items: baseline; gap: 5px; border-top: 1px solid var(--border); padding-top: 14px; }
  .rating-number { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--red-accent); line-height: 1; }
  .rating-max { font-size: 12px; color: var(--muted); }
  .rating-stars { margin-left: auto; color: var(--gold); font-size: 11px; letter-spacing: 1px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,20,0.72); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; padding: 40px 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--warm-white); max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1.1fr; position: relative; animation: modalIn 0.28s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  .modal-img { width: 100%; height: 100%; min-height: 420px; object-fit: cover; display: block; }
  .modal-img-placeholder { width: 100%; min-height: 420px; display: flex; align-items: center; justify-content: center; font-size: 4rem; background: linear-gradient(135deg, #EDE5D8 0%, #D8CBBA 100%); }
  .modal-body { padding: 36px 32px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; }
  .modal-close { position: absolute; top: 14px; right: 14px; background: var(--warm-white); border: 1px solid var(--border); width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--ink); z-index: 10; }
  .modal-type { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 400; line-height: 1.2; }
  .modal-title em { font-style: italic; color: var(--muted); }
  .modal-rating { display: flex; align-items: baseline; gap: 6px; }
  .modal-rating .rating-number { font-size: 2.8rem; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .detail-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .detail-value { font-family: 'Cormorant Garamond', serif; font-size: 1rem; }
  .tasting-note { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--muted); line-height: 1.65; border-left: 2px solid var(--gold); padding-left: 14px; }
  .modal-timestamp { font-size: 11px; color: var(--border); letter-spacing: 1px; margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); }

  .loading { text-align: center; padding: 80px 0; color: var(--muted); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
  .spinner { width: 28px; height: 28px; border: 1px solid var(--border); border-top-color: var(--red-accent); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 18px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 80px 0; color: var(--muted); font-size: 13px; letter-spacing: 1px; }
  .empty-icon { font-size: 3rem; margin-bottom: 14px; }

  .error-box { background: var(--cream); border: 1px solid var(--border); padding: 32px; max-width: 600px; margin: 40px auto; font-size: 13px; line-height: 1.8; color: var(--muted); }
  .error-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: 12px; font-weight: 400; }
  .error-box code { background: #e8e0d0; padding: 2px 6px; font-size: 11px; }

  @media (max-width: 700px) {
    header { padding: 50px 20px 0; }
    nav { padding: 0; overflow-x: auto; justify-content: flex-start; }
    .tab { padding: 16px 18px; font-size: 10px; }
    main { padding: 0 20px 60px; }
    .wine-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
    .modal { grid-template-columns: 1fr; }
    .modal-img, .modal-img-placeholder { min-height: 240px; }
    .stats-bar { gap: 20px; padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>Thomas & <em>Shannie</em></h1>
  <p class="header-sub">Rater Vin</p>
  <div class="stats-bar" id="statsBar">
    <div class="stat"><div class="spinner"></div></div>
  </div>
</header>

<nav>
  <button class="tab active" onclick="switchTab('Rødvin')"><span class="tab-dot dot-red"></span>Rødvin</button>
  <button class="tab" onclick="switchTab('Hvidvin')"><span class="tab-dot dot-white"></span>Hvidvin</button>
  <button class="tab" onclick="switchTab('Orangevin')"><span class="tab-dot dot-orange"></span>Orangevin</button>
  <button class="tab" onclick="switchTab('Rosé')"><span class="tab-dot dot-rose"></span>Rosé</button>
</nav>

<main>
  <div id="Rødvin" class="section active"><div class="loading"><div class="spinner"></div>Henter vine...</div></div>
  <div id="Hvidvin" class="section"><div class="loading"><div class="spinner"></div>Henter vine...</div></div>
  <div id="Orangevin" class="section"><div class="loading"><div class="spinner"></div>Henter vine...</div></div>
  <div id="Rosé" class="section"><div class="loading"><div class="spinner"></div>Henter vine...</div></div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modal">
    <div id="modalLeft"></div>
    <div class="modal-body" id="modalBody"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SHEET_ID = '1R83N-tREYeyqEv5-CFePtlUzWGPRpr5RL5Z1Pllvu_w';
const TABS = ['Rødvin', 'Hvidvin', 'Orangevin', 'Rosé'];
// ──────────────────────────────────────────────────────────

let allWines = [];
let currentTab = 'Rødvin';

// Google Sheets Visualization API — works locally, no CORS issues
function gvizUrl(sheetId) {
  return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
}

async function loadData() {
  try {
    const url = gvizUrl(SHEET_ID);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();

    // Google wraps the JSON in /*O_o*/\ngoogle.visualization.Query.setResponse(...)
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const table = json.table;
    const cols = table.cols.map(c => c.label);

    allWines = table.rows
      .filter(r => r && r.c)
      .map(r => {
        const obj = {};
        cols.forEach((col, i) => {
          const cell = r.c[i];
          obj[col] = cell && cell.v !== null && cell.v !== undefined ? String(cell.v).trim() : '';
        });
        return obj;
      })
      .filter(r => r['Type'] && r['Type'].trim() !== '');

    renderStats();
    TABS.forEach(t => renderSection(t));
    TABS.forEach(t => { if (t !== currentTab) document.getElementById(t).classList.remove('active'); });

  } catch (e) {
    console.error(e);
    const errHtml = `
      <div class="error-box">
        <h3>Kunne ikke hente data 😢</h3>
        <p>Kontrollér at dit Google Sheet er delt som <strong>"Alle med linket kan se"</strong>:</p>
        <ol style="margin: 12px 0 0 20px; line-height: 2.2">
          <li>Åbn dit Google Sheet</li>
          <li>Klik <strong>Del</strong> (øverst til højre)</li>
          <li>Under "Generel adgang" — vælg <strong>"Alle med linket"</strong> + <strong>"Læser"</strong></li>
          <li>Gem og genindlæs denne side</li>
        </ol>
        <p style="margin-top:14px; opacity:.6; font-size:11px">Fejl: ${e.message}</p>
      </div>`;
    TABS.forEach(t => { document.getElementById(t).innerHTML = errHtml; });
    document.getElementById('statsBar').innerHTML = '';
  }
}

function driveImgUrl(raw) {
  if (!raw) return null;
  let m = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
  if (/^[a-zA-Z0-9_-]{20,}$/.test(raw.trim())) return `https://drive.google.com/uc?export=view&id=${raw.trim()}`;
  if (raw.startsWith('http')) return raw;
  return null;
}

function normalizeType(t) {
  const s = (t || '').trim().toLowerCase();
  if (s === 'rødvin' || s === 'rødvin') return 'Rødvin';
  if (s === 'hvidvin') return 'Hvidvin';
  if (s === 'orangevin') return 'Orangevin';
  if (s === 'rosé' || s === 'rose') return 'Rosé';
  return (t || '').trim();
}

function renderStats() {
  const total = allWines.length;
  const ratings = allWines.map(w => parseFloat(w['Rating'])).filter(r => !isNaN(r));
  const avg = ratings.length ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1) : '–';
  const countries = new Set(allWines.map(w => w['Land']).filter(Boolean)).size;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-number">${total}</div><div class="stat-label">Vine smagt</div></div>
    <div class="stat"><div class="stat-number">${avg}</div><div class="stat-label">Gns. rating</div></div>
    <div class="stat"><div class="stat-number">${countries}</div><div class="stat-label">Lande</div></div>`;
}

function renderSection(type) {
  const container = document.getElementById(type);
  const wines = allWines.filter(w => normalizeType(w['Type']) === type);
  if (wines.length === 0) {
    container.innerHTML = `
      <div class="section-header">
        <div class="section-title">${type}</div><div class="section-line"></div>
        <div class="section-count">0 vine</div>
      </div>
      <div class="empty"><div class="empty-icon">🍾</div>Ingen vine registreret endnu</div>`;
    return;
  }
  const sorted = [...wines].sort((a, b) => (parseFloat(b['Rating']) || 0) - (parseFloat(a['Rating']) || 0));
  container.innerHTML = `
    <div class="section-header">
      <div class="section-title">${type}</div><div class="section-line"></div>
      <div class="section-count">${wines.length} vine</div>
    </div>
    <div class="wine-grid">${sorted.map((w, i) => cardHTML(w, i)).join('')}</div>`;
}

function cardHTML(w, i) {
  const idx = allWines.indexOf(w);
  const producer = w['Vinhus/Producent'] || '';
  const grape    = w['Drue(r)'] || '';
  const country  = w['Land'] || '';
  const region   = w['Region'] || '';
  const year     = w['Årgang'] || '';
  const price    = w['Pris (i runde tal)'] || '';
  const rating   = w['Rating'] || '';
  const imgUrl   = driveImgUrl(w['Billede'] || '');
  const delay    = (i % 12) * 55;

  const imgTag = imgUrl
    ? `<img class="wine-image" src="${imgUrl}" alt="${grape}" loading="lazy" onerror="this.outerHTML='<div class=wine-placeholder>🍷</div>'">`
    : `<div class="wine-placeholder">🍷</div>`;

  const meta = [country, region, year, price ? price + ' kr.' : ''].filter(Boolean);

  return `
    <div class="wine-card" style="animation-delay:${delay}ms" onclick="openModal(${idx})">
      ${imgTag}
      <div class="wine-body">
        <div class="wine-producer">${producer || '—'}</div>
        <div class="wine-name">${grape || 'Ukendt vin'}</div>
        <div class="wine-meta">${meta.map(p => `<span>${p}</span>`).join('')}</div>
        <div class="wine-rating">
          <span class="rating-number">${rating || '–'}</span>
          <span class="rating-max">/ 10</span>
          <span class="rating-stars">${stars(rating)}</span>
        </div>
      </div>
    </div>`;
}

function stars(r) {
  const n = parseFloat(r);
  if (isNaN(n)) return '';
  const f = Math.max(0, Math.min(5, Math.round(n / 2)));
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}

function openModal(idx) {
  const w = allWines[idx];
  const imgUrl = driveImgUrl(w['Billede'] || '');

  document.getElementById('modalLeft').innerHTML = imgUrl
    ? `<img class="modal-img" src="${imgUrl}" onerror="this.outerHTML='<div class=modal-img-placeholder>🍷</div>'">`
    : `<div class="modal-img-placeholder">🍷</div>`;

  const details = [
    w['Land']               ? { l: 'Land',    v: w['Land'] }                      : null,
    w['Region']             ? { l: 'Region',  v: w['Region'] }                    : null,
    w['Årgang']             ? { l: 'Årgang',  v: w['Årgang'] }                    : null,
    w['Pris (i runde tal)'] ? { l: 'Pris',    v: w['Pris (i runde tal)'] + ' kr.' } : null,
  ].filter(Boolean);

  document.getElementById('modalBody').innerHTML = `
    <div>
      <div class="modal-type">${normalizeType(w['Type'])}</div>
      <div class="modal-title">${w['Vinhus/Producent'] ? w['Vinhus/Producent'] + '<br>' : ''}<em>${w['Drue(r)'] || 'Ukendt vin'}</em></div>
    </div>
    <div class="modal-rating">
      <span class="rating-number">${w['Rating'] || '–'}</span>
      <span class="rating-max" style="font-size:14px">/ 10</span>
      <span class="rating-stars" style="font-size:15px;margin-left:10px">${stars(w['Rating'])}</span>
    </div>
    ${details.length ? `<div class="detail-grid">${details.map(d => `<div><div class="detail-label">${d.l}</div><div class="detail-value">${d.v}</div></div>`).join('')}</div>` : ''}
    ${w['Din første tanke når du ser mig!'] ? `<div class="tasting-note">"${w['Din første tanke når du ser mig!']}"</div>` : ''}
    ${w['Kendetegn'] ? `<div><div class="detail-label">Kendetegn</div><div class="detail-value" style="font-family:'Cormorant Garamond',serif;line-height:1.55">${w['Kendetegn']}</div></div>` : ''}
    ${w['Hvor og i hvilken anledning får vi vinen,'] ? `<div><div class="detail-label">Anledning</div><div class="detail-value" style="font-family:'Cormorant Garamond',serif;line-height:1.5">${w['Hvor og i hvilken anledning får vi vinen,']}</div></div>` : ''}
    ${w['Tidsstempel'] ? `<div class="modal-timestamp">${w['Tidsstempel']}</div>` : ''}`;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open');
}

function switchTab(type) {
  currentTab = type;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', TABS[i] === type));
  TABS.forEach(t => document.getElementById(t).classList.toggle('active', t === type));
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open'); });

loadData();
</script>
</body>
</html>
